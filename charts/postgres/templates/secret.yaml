apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ required "auth.password is required" .Values.auth.password | quote }}
  POSTGRES_USER: {{ .Values.auth.username | quote }}
  POSTGRES_DB: {{ .Values.auth.database | quote }}
  DATABASE_URL: "postgres://{{ .Values.auth.username }}:{{ .Values.auth.password }}@postgres:5432/{{ .Values.auth.database }}?sslmode=disable"
