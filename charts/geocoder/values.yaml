replicaCount: 1

image:
  repository: ghcr.io/rsmrtk/geo-mlops
  tag: latest
  pullPolicy: IfNotPresent

service:
  port: 8080

ingress:
  enabled: true
  host: ""  # required — set per-env, e.g. geo.<your-cluster-ip>.nip.io (no public IP is committed to this repo)

env:
  NOMINATIM_URL: "https://nominatim.openstreetmap.org"
  ML_SVC_URL: "http://ml-svc:5001"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
