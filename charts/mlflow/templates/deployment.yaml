apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  labels:
    app: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - mlflow
            - server
            - --host=0.0.0.0
            - --port={{ .Values.service.port }}
            - --backend-store-uri=sqlite:///mlflow/mlflow.db
            {{- if .Values.gcs.bucket }}
            - --default-artifact-root={{ .Values.gcs.bucket }}
            {{- else }}
            - --default-artifact-root=/mlflow/artifacts
            {{- end }}
          ports:
            - containerPort: {{ .Values.service.port }}
          {{- if .Values.gcs.bucket }}
          env:
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /secrets/gcs/key.json
          {{- end }}
          volumeMounts:
            - name: mlflow-data
              mountPath: /mlflow
            {{- if .Values.gcs.bucket }}
            - name: gcs-key
              mountPath: /secrets/gcs
              readOnly: true
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: mlflow-data
          persistentVolumeClaim:
            claimName: mlflow-data
        {{- if .Values.gcs.bucket }}
        - name: gcs-key
          secret:
            secretName: {{ .Values.gcs.secretName }}
        {{- end }}
