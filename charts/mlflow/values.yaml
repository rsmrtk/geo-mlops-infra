image:
  repository: ghcr.io/mlflow/mlflow
  tag: v2.16.0
  pullPolicy: IfNotPresent

service:
  port: 5000

persistence:
  size: 5Gi
  storageClass: ""

gcs:
  bucket: "" # e.g. gs://<your-project>-mlflow-artifacts — leave empty to fall back to local artifact storage
  secretName: "mlflow-gcs-key" # k8s Secret containing a GCS service-account key.json — create it yourself, never commit it

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
