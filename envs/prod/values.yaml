# Production overrides — ArgoCD applies these on top of each chart's values.yaml
# Replace <PUBLIC_IP> with your Oracle VM IP after provisioning

geocoder:
  image:
    tag: latest  # GitHub Actions updates this field automatically on each push
  ingress:
    host: "geo.<PUBLIC_IP>.nip.io"

ml-svc:
  image:
    tag: latest

mlflow:
  persistence:
    size: 5Gi
